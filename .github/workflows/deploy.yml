# Simple workflow for deploying static content to GitHub Pages
name: Deploy

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Runs every day at 5:00 AM Beijing time (21:00 UTC of the previous day)
  schedule:
    - cron: "0 21 * * *"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: npm install -g pnpm
      - name: Install dependencies and build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm install --no-frozen-lockfile

          echo "::group::GitHub metrics from REST API"
          node - <<'NODE' | tee .github-metrics-rest.json
          const headers = {
            Accept: 'application/vnd.github+json',
            'User-Agent': 'RustFS-Website',
            'X-GitHub-Api-Version': '2022-11-28',
            Authorization: `Bearer ${process.env.GITHUB_TOKEN}`,
          };

          function parseCommitCount(linkHeader) {
            const match = linkHeader?.match(/page=(\d+)>; rel="last"/);
            if (!match?.[1]) {
              return null;
            }

            const page = Number(match[1]);
            return Number.isFinite(page) && page > 0 ? page : null;
          }

          async function main() {
            const [repoRes, commitsRes] = await Promise.all([
              fetch('https://api.github.com/repos/rustfs/rustfs', { headers }),
              fetch('https://api.github.com/repos/rustfs/rustfs/commits?per_page=1', { headers }),
            ]);

            const repo = await repoRes.json();
            const commitCount = parseCommitCount(commitsRes.headers.get('link'));

            console.log(JSON.stringify({
              repoStatus: repoRes.status,
              commitsStatus: commitsRes.status,
              stars: repo.stargazers_count,
              forks: repo.forks_count,
              commits: commitCount,
              link: commitsRes.headers.get('link'),
            }, null, 2));
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
          echo "::endgroup::"

          echo "::group::GitHub metrics from lib/github.ts"
          npx tsx -e "import { getGitHubMetrics } from './lib/github.ts'; getGitHubMetrics().then((metrics) => console.log(JSON.stringify(metrics, null, 2))).catch((error) => { console.error(error); process.exit(1); })" | tee .github-metrics-lib.json
          echo "::endgroup::"

          pnpm run build

          echo "::group::GitHub metrics rendered into out/index.html"
          node - <<'NODE' | tee .github-metrics-rendered.txt
          const fs = require('node:fs');

          const html = fs.readFileSync('out/index.html', 'utf8');
          const labels = ['GitHub Stars', 'GitHub Forks', 'Repo Commits', 'GitHub 提交'];

          for (const label of labels) {
            const index = html.indexOf(label);

            if (index === -1) {
              console.log(`${label}: not found`);
              continue;
            }

            const prefix = html.slice(Math.max(0, index - 400), index);
            const matches = [...prefix.matchAll(/>([\d,]+(?:\+)?)<\/(?:span|p)>/g)];
            const value = matches.at(-1)?.[1] ?? 'not found';

            console.log(`${label}: ${value}`);
          }
          NODE
          echo "::endgroup::"
      - name: Summarize GitHub metrics
        if: always()
        run: |
          print_file() {
            local title="$1"
            local file="$2"

            echo "$title"
            if [ -f "$file" ]; then
              cat "$file"
            else
              echo "not generated"
            fi
            echo
          }

          append_summary() {
            local title="$1"
            local fence="$2"
            local file="$3"

            echo "### $title" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`$fence" >> "$GITHUB_STEP_SUMMARY"
            if [ -f "$file" ]; then
              cat "$file" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "not generated" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo >> "$GITHUB_STEP_SUMMARY"
          }

          print_file "REST API metrics:" ".github-metrics-rest.json"
          print_file "lib/github.ts metrics:" ".github-metrics-lib.json"
          print_file "Rendered metrics from out/index.html:" ".github-metrics-rendered.txt"

          {
            echo "## GitHub Metrics Debug"
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          append_summary "REST API" "json" ".github-metrics-rest.json"
          append_summary "lib/github.ts" "json" ".github-metrics-lib.json"
          append_summary "out/index.html" "text" ".github-metrics-rendered.txt"
      - name: Install Aliyun OSS CLI
        if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        shell: bash
        run: |
          echo "Installing ossutil2"
          curl -o ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.1.1/ossutil-2.1.1-linux-amd64.zip
          unzip -o ossutil.zip
          chmod 755 ossutil-2.1.1-linux-amd64/ossutil
          sudo mv ossutil-2.1.1-linux-amd64/ossutil /usr/local/bin/
          rm -rf ossutil.zip ossutil-2.1.1-linux-amd64

          echo "ossutil2 installation completed"

      - name: Upload to Aliyun OSS
        # if: startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        shell: bash
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.ALICLOUDOSS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.ALICLOUDOSS_KEY_SECRET }}
          OSS_REGION: cn-beijing
          OSS_ENDPOINT: https://oss-cn-beijing.aliyuncs.com
          BUCKET: www-rustfs-com-cn
        run: |
          echo "Uploading to OSS"
          # ossutil rm -r oss://$BUCKET/ --force
          ossutil cp -r ./out/ oss://$BUCKET/ --force
          echo "Successfully uploaded to OSS"
      - name: Show OSS error log if exists
        if: failure()
        run: |
          cat /home/runner/work/rustfs.com.cn/rustfs.com.cn/ossutil_output/*.report || true
